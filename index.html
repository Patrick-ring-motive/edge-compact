<html><body><code><pre class="wrap-text"></pre></code>
<style>
.wrap-text {
 max-width: 100vw;
  /* Modern standard */
  overflow-wrap: break-word; 
  /* Legacy alias for older browsers */
  word-wrap: break-word;       
}

</style>
    <script>
    (async () => {
      /* ---------- toy corpus: 4 loose topics, kept tiny on purpose ---------- */
      const fetchText = async (...args) => {
        let txt;
        try {
          const res = await fetch(...args)
          txt = res.statusText || '';
          txt = await res.text();
          return txt;
        } catch (e) {
          return txt || String(e);
        }
      };

      const getCorpus = async (...args) => {

        const txt = await fetchText(...args);

        const segmenter = new Intl.Segmenter("en", {
          granularity: "sentence"
        });

        return [...segmenter.segment(txt.replaceAll(/\n|¬/g, ''))].map(x => x.segment.trim()).filter(Boolean);

      };

      const CORPUS = await getCorpus('https://patrick-ring-motive.github.io/tolkienizer/fellowship.txt');
      const compact = await import('https://patrick-ring-motive.github.io/edge-compact/compact.js');
      document.querySelector('pre').innerText = (compact?.edgeCompact??compact)(CORPUS.join(''));
    })();
</script>
</body></html>
